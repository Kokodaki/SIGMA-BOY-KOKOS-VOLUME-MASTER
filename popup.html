<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sigma Boi Koko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      background: #0d0d0d;
      color: #fff;
      font-family: 'Geist', system-ui, -apple-system, sans-serif;
      user-select: none;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 22px 0;
    }

    .wordmark {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    .tab-badge {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.2);
      font-variant-numeric: tabular-nums;
    }

    /* HERO VOLUME */
    .hero {
      padding: 28px 22px 8px;
    }

    .pct-row {
      display: flex;
      align-items: flex-start;
      gap: 2px;
      line-height: 1;
    }

    .pct-num {
      font-size: 64px;
      font-weight: 300;
      color: rgba(255,255,255,0.92);
      letter-spacing: -3px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      transition: color 0.25s;
    }

    .pct-unit {
      font-size: 18px;
      font-weight: 300;
      color: rgba(255,255,255,0.25);
      margin-top: 12px;
    }

    .status-line {
      margin-top: 8px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.22);
      min-height: 16px;
      transition: color 0.25s;
    }

    .status-line.boosted { color: rgba(130,255,160,0.55); }
    .status-line.muted   { color: rgba(255,80,80,0.45); }

    /* SLIDER */
    .slider-section {
      padding: 24px 22px 0;
    }

    .track-wrap {
      position: relative;
      height: 24px;
      display: flex;
      align-items: center;
    }

    .track-bg {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      pointer-events: none;
    }

    .track-fill {
      position: absolute;
      left: 0;
      height: 2px;
      background: rgba(255,255,255,0.28);
      border-radius: 2px;
      pointer-events: none;
      transition: width 0.05s, background 0.25s;
    }

    .track-fill.boosted { background: rgba(130,255,160,0.45); }
    .track-fill.muted   { background: rgba(255,255,255,0.08); }

    input[type="range"] {
      -webkit-appearance: none;
      position: relative;
      width: 100%;
      height: 24px;
      background: transparent;
      cursor: pointer;
      outline: none;
      margin: 0;
      z-index: 2;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      background: transparent;
      height: 2px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #e8e8e8;
      margin-top: -6px;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
      transition: box-shadow 0.15s, transform 0.1s;
    }

    input[type="range"]:hover::-webkit-slider-thumb {
      box-shadow: 0 0 0 5px rgba(255,255,255,0.1);
    }

    input[type="range"]:active::-webkit-slider-thumb {
      transform: scale(0.9);
    }

    .scale {
      display: flex;
      justify-content: space-between;
      padding: 6px 0 0;
    }

    .scale span {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.15);
    }

    /* CONTROLS */
    .controls {
      display: flex;
      gap: 8px;
      padding: 20px 22px 22px;
    }

    .btn {
      flex: 1;
      height: 36px;
      border-radius: 9px;
      border: 0.5px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.4);
      font-family: 'Geist', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:hover {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.65);
      border-color: rgba(255,255,255,0.15);
    }

    .btn.mute-active {
      border-color: rgba(255,70,70,0.3);
      color: rgba(255,100,100,0.65);
      background: rgba(255,60,60,0.05);
    }

    .btn.mute-active:hover {
      background: rgba(255,60,60,0.1);
      color: rgba(255,120,120,0.8);
    }

    .btn svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <span class="wordmark">Koko</span>
    <span class="tab-badge" id="tabBadge">Tab —</span>
  </div>

  <div class="hero">
    <div class="pct-row">
      <div class="pct-num" id="volumeNumber">100</div>
      <div class="pct-unit">%</div>
    </div>
    <div class="status-line" id="statusLine">Active</div>
  </div>

  <div class="slider-section">
    <div class="track-wrap">
      <div class="track-bg"></div>
      <div class="track-fill" id="trackFill"></div>
      <input type="range" id="volumeSlider" min="0" max="600" value="100" step="1" />
    </div>
    <div class="scale">
      <span>0</span>
      <span>100%</span>
      <span>300%</span>
      <span>600%</span>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="muteBtn">
      <svg id="speakerIcon" viewBox="0 0 24 24">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
      </svg>
      <span id="muteLabel">Mute</span>
    </button>
    <button class="btn" id="resetBtn">
      <svg viewBox="0 0 24 24">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 .49-3.5"></path>
      </svg>
      Reset
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
